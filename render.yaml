services:
  - type: web
    name: agent-builder-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: agent-builder-db
          property: connectionString
      - key: DB_SSL_REQUIRE
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: FRONTEND_ORIGIN_REGEX
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CRICAPI_KEY
        sync: false

databases:
  - name: agent-builder-db
    plan: free
